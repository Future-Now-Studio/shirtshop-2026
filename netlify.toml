[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Proxy WooCommerce API calls through Netlify Functions
# This avoids CORS issues and hides API credentials
[[redirects]]
  from = "/api/wc/*"
  to = "/.netlify/functions/wc-proxy/:splat"
  status = 200

# SPA fallback - must be LAST redirect rule
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
